<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOWLOG · TV Ad Monitoring Table</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Spline+Sans+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15171c; --paper:#eef0f3; --card:#fafbfc;
    --line:#c9cdd6; --muted:#787e8c;
    --accent:#6b2cf5; --accent2:#0e8f6e; --gold:#c98a1e;
    --band-show:#3a2f63; --band-break:#5a3a16; --band-seg:#143f33; --band-ad:#5a3a16;
    --shadow:0 2px 0 var(--line);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--paper);color:var(--ink);
    font-family:'Archivo',sans-serif;
    background-image:linear-gradient(var(--line) 1px,transparent 1px);
    background-size:100% 40px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1280px;margin:0 auto;padding:28px 22px 80px}

  header{
    border:2px solid var(--ink);background:var(--card);
    padding:20px 24px;display:flex;justify-content:space-between;
    align-items:flex-end;flex-wrap:wrap;gap:16px;box-shadow:6px 6px 0 var(--ink);
  }
  .brand h1{font-family:'Fraunces',serif;font-size:36px;font-weight:700;letter-spacing:-1px;line-height:.95}
  .brand h1 span{color:var(--accent)}
  .brand p{
    font-family:'Spline Sans Mono',monospace;font-size:11px;
    color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:6px;
  }
  .loadbox{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .btn{
    font-family:'Spline Sans Mono',monospace;font-size:12px;font-weight:600;
    text-transform:uppercase;letter-spacing:1px;cursor:pointer;
    border:2px solid var(--ink);background:var(--ink);color:var(--card);
    padding:11px 18px;transition:transform .08s;
  }
  .btn:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--accent)}
  .btn.ghost{background:var(--card);color:var(--ink)}
  .btn.ghost:hover{box-shadow:3px 3px 0 var(--ink)}
  .source-tag{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--muted);width:100%;text-align:right}

  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:26px 0}
  .stat{background:var(--card);border:2px solid var(--ink);padding:16px 14px;box-shadow:var(--shadow)}
  .stat .k{font-family:'Spline Sans Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
  .stat .v{font-family:'Fraunces',serif;font-size:30px;font-weight:700;line-height:1;margin-top:8px}
  .stat .v small{font-size:13px;color:var(--muted);font-family:'Archivo'}
  .stat:nth-child(1) .v{color:var(--accent)}
  .stat:nth-child(2) .v{color:var(--accent2)}
  .stat:nth-child(3) .v{color:var(--gold)}

  .filters{
    display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;
    background:var(--card);border:2px solid var(--ink);
    padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow);
  }
  .filters label{
    font-family:'Spline Sans Mono',monospace;font-size:10px;
    text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    display:flex;flex-direction:column;gap:5px;
  }
  select,input[type=text]{
    font-family:'Archivo';font-size:13px;padding:7px 9px;
    border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);min-width:130px;
  }
  input[type=text]{min-width:200px}
  .chk{flex-direction:row !important;align-items:center;gap:7px !important;cursor:pointer}
  .chk input{width:15px;height:15px}
  .clearf{
    font-family:'Spline Sans Mono',monospace;font-size:10px;
    text-transform:uppercase;letter-spacing:1px;cursor:pointer;
    border:1.5px solid var(--ink);background:var(--paper);padding:8px 12px;color:var(--ink);
  }
  .clearf:hover{background:var(--accent);color:var(--card)}

  .tablebar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px}
  .tablebar h2{font-family:'Fraunces',serif;font-size:22px;font-weight:600}
  .tablebar h2 small{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--muted);font-weight:400}

  .channels{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .chbtn{
    font-family:'Spline Sans Mono',monospace;font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.8px;cursor:pointer;
    border:2px solid var(--ink);background:var(--card);color:var(--ink);
    padding:9px 15px;transition:transform .08s;
  }
  .chbtn:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--accent)}
  .chbtn.active{background:var(--accent);color:#fff;box-shadow:3px 3px 0 var(--ink)}
  .chbtn.active:hover{transform:none}
  .chdot{color:var(--accent2);font-size:9px;vertical-align:middle}
  .chbtn.active .chdot{color:#9affd9}

  .chanmap{
    background:var(--card);border:2px solid var(--ink);box-shadow:var(--shadow);
    padding:14px 16px;margin-bottom:14px;
  }
  .cmhead{
    font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:10px;
  }
  .cmwarn{
    font-family:'Spline Sans Mono',monospace;font-size:10px;font-weight:600;
    background:var(--gold);color:#fff;padding:2px 8px;letter-spacing:.5px;
  }
  .cmok{
    font-family:'Spline Sans Mono',monospace;font-size:10px;font-weight:600;
    background:var(--accent2);color:#fff;padding:2px 8px;letter-spacing:.5px;
  }
  .cmgrid{display:flex;flex-wrap:wrap;gap:8px 18px}
  .cmrow{display:flex;align-items:center;gap:8px}
  .cmraw{
    font-family:'Spline Sans Mono',monospace;font-size:12px;font-weight:600;
    min-width:90px;
  }
  .cmraw em{color:var(--muted);font-weight:400;font-style:normal}
  .cmarrow{color:var(--muted);font-family:'Spline Sans Mono',monospace}
  .cmsel{font-family:'Archivo';font-size:12px;padding:5px 7px;
    border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);min-width:120px}
  .cmnote{
    font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--muted);
    margin-top:10px;line-height:1.6;
  }

  .tablecard{background:var(--card);border:2px solid var(--ink);box-shadow:var(--shadow);overflow:auto;max-height:640px}
  table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:11px}

  /* banded group header row */
  tr.bands th{
    font-family:'Spline Sans Mono',monospace;font-size:10px;font-weight:600;
    text-transform:uppercase;letter-spacing:1.5px;text-align:center;
    color:#fff;padding:6px 8px;position:sticky;top:0;z-index:5;
    border-right:2px solid var(--ink);
  }
  th.band-show{background:var(--band-show)}
  th.band-break{background:var(--band-break)}
  th.band-seg{background:var(--band-seg)}
  th.band-ad{background:var(--band-ad)}

  /* column header row */
  tr.cols th{
    font-family:'Spline Sans Mono',monospace;font-size:9.5px;text-transform:uppercase;
    letter-spacing:.4px;text-align:left;background:var(--ink);color:var(--card);
    padding:8px 9px;position:sticky;top:24px;cursor:pointer;white-space:nowrap;z-index:4;
    border-right:1px solid #3a3d44;
  }
  tr.cols th:hover{background:var(--accent)}
  tr.cols th.gs{border-left:2px solid var(--ink)}
  th .arr{opacity:.55;font-size:8px}

  td{padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap;border-right:1px solid var(--line)}
  td.gs{border-left:2px solid var(--ink)}
  tbody tr:nth-child(even){background:rgba(201,205,214,.30)}
  tbody tr:hover{background:rgba(107,44,245,.08)}

  /* frozen Programme column */
  th.freeze,td.freeze{position:sticky;left:0;z-index:3}
  tr.cols th.freeze{z-index:6}
  tr.bands th.freeze{z-index:7}
  td.freeze{background:var(--card);font-weight:700}
  tbody tr:nth-child(even) td.freeze{background:#eceef1}
  tbody tr:hover td.freeze{background:#e4ddfb}

  td.num{font-family:'Spline Sans Mono',monospace;text-align:right}
  td.time{font-family:'Spline Sans Mono',monospace}
  td.bold{font-weight:700}
  .pill{font-family:'Spline Sans Mono',monospace;font-size:9.5px;padding:2px 6px;border:1px solid var(--ink);display:inline-block}
  .mute{color:var(--muted)}
  .blank{color:#b9bdc6}

  .empty{padding:48px;text-align:center;color:var(--muted);font-family:'Spline Sans Mono',monospace;font-size:13px}

  .loaderr{padding:34px 30px;max-width:680px}
  .loaderr-title{
    font-family:'Fraunces',serif;font-size:20px;font-weight:700;
    color:var(--gold);margin-bottom:12px;
  }
  .loaderr-detail{
    font-family:'Spline Sans Mono',monospace;font-size:12px;
    line-height:1.7;color:var(--ink);
  }

  .pager{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .pager button{
    font-family:'Spline Sans Mono',monospace;font-size:11px;
    border:1.5px solid var(--ink);background:var(--card);color:var(--ink);padding:6px 11px;cursor:pointer;
  }
  .pager button:hover:not(:disabled){background:var(--ink);color:var(--card)}
  .pager button:disabled{opacity:.35;cursor:not-allowed}
  .pager .info{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--muted)}
  .note{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px}
  .pgsize{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--muted)}

  @media(max-width:860px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .brand h1{font-size:28px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <h1>SHOW<span>LOG</span></h1>
      <p>TV Ad Monitoring · Channel Spot Table</p>
    </div>
    <div class="loadbox">
      <button class="btn ghost" id="sampleBtn">Load Sample</button>
      <button class="btn" id="uploadBtn">Upload Excel</button>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
      <div class="source-tag" id="sourceTag"></div>
    </div>
  </header>

  <div class="stats" id="stats"></div>
  <div class="filters" id="filters"></div>

  <div class="tablebar">
    <h2><span id="tableHeading">All Shows</span> <small id="colCount"></small></h2>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="pgsize">Rows:
        <select id="pageSize" style="min-width:auto;padding:4px 6px">
          <option>25</option><option selected>50</option><option>100</option><option>250</option>
        </select>
      </div>
      <button class="btn ghost" id="exportBtn">Export CSV</button>
    </div>
  </div>
  <div class="channels" id="channels"></div>
  <div class="chanmap" id="chanMap" style="display:none"></div>
  <div class="tablecard"><div id="tableArea"></div></div>
  <div class="pager" id="pager"></div>
  <div class="note" id="tableNote"></div>

</div>

<script>
/* ====== column model — mirrors the 68-column Zee TV sheet ======
   group: show | break | seg
   type:  text | num | time | pill | progfreeze
   each row object stores values keyed by these ids. */
const SHOW_COLS=[
  ["wkcode","WK Code","bold"],
  ["minsmissing","Mins Missing","num"],
  ["week","Week","text"],
  ["day","Day","pill"],
  ["date","Date","text"],
  ["starttime","Start Time","time"],
  ["progname","PROGNAME","progfreeze"],
  ["progst","PROG ST","time"],
  ["proget","PROG ET","time"],
  ["contentdur","Content Dur","num"],
  ["progdur","Prog Dur","num"],
  ["addur","Ad Dur","num"],
  ["nbreaks","No.Of Breaks","num"]
];
/* 18 ad-break Start/End pairs */
const BREAK_COLS=[];
for(let i=1;i<=18;i++){
  BREAK_COLS.push(["b"+i+"st","B"+i+" ST","time"]);
  BREAK_COLS.push(["b"+i+"et","B"+i+" ET","time"]);
}
/* 18 Seg columns + Last Seg */
const SEG_COLS=[];
for(let i=1;i<=18;i++) SEG_COLS.push(["seg"+i,"Seg "+i,"num"]);
SEG_COLS.push(["lastseg","Last Seg","num"]);

/* ---- Zee TV programme format (68 columns) ---- */
const COLS_ZEE=[
  ...SHOW_COLS.map(c=>[...c,"show"]),
  ...BREAK_COLS.map(c=>[...c,"break"]),
  ...SEG_COLS.map(c=>[...c,"seg"])
];

/* ---- brand-ads format (one row per ad spot) ---- */
const COLS_ADS=[
  ["chnlname","Channel","pill","show"],
  ["progdate","Prog Date","text","show"],
  ["progst","Prog ST","time","show"],
  ["proget","Prog ET","time","show"],
  ["progname","Programme","progfreeze","show"],
  ["proggenre","Genre","pill","show"],
  ["progdur","Prog Dur","num","show"],
  ["addate","Ad Date","text","ad"],
  ["adsrno","Ad Sr No","num","ad"],
  ["totalads","Total Ads","num","ad"],
  ["brkno","Break No","num","ad"],
  ["brandname","Brand Name","text","ad"],
  ["brandcatg","Brand Catg","pill","ad"],
  ["company","Company","text","ad"],
  ["adcaption","Ad Caption","text","ad"],
  ["adst","Ad ST","time","ad"],
  ["adet","Ad ET","time","ad"],
  ["duration","Duration","num","ad"],
  ["adlang","Ad Lang","pill","ad"]
];

/* active column set + format flag.
   the app's OUTPUT is always the Zee programme format (one row per show);
   brand-ads input files are transformed into it on load. */
let COLS=COLS_ZEE;
let FORMAT="zee";

/* ====== embedded sample: one show row, as produced by the transform ====== */
function blankRow(){const o={};COLS.forEach(([k])=>o[k]=null);return o;}
const SAMPLE=(()=>{
  const r={}; COLS_ZEE.forEach(([k])=>r[k]=null);
  Object.assign(r,{
    chnlname:"&TV",wkcode:"Week 20",week:"Week 20",minsmissing:null,
    progname:"COMEDY CIRCUS KE AJOOBE",date:"2026-05-20",day:"Wednesday",
    starttime:"07:08:37",progst:"07:08:37",proget:"07:54:18",
    progdur:46,addur:4.67,contentdur:41.33,nbreaks:2,
    b1st:"07:40:40",b1et:"07:43:20",b2st:"07:47:28",b2et:"07:49:28",
    seg1:32.05,seg2:4.13,lastseg:4.83
  });
  return {rows:[r],format:"zee"};
})();

let RAW=[];
let sortKey=null,sortDir=1;
let page=1,pageSize=50;
const filterState={f1:"",f2:"",q:""};
let hideEmptyBreaks=false;   // optionally collapse all-empty break/seg columns

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fixnum(v){return (v==null||v==="")?null:(Math.round(parseFloat(v)*100)/100);}
function pad2(n){return String(n).padStart(2,"0");}
function excelTime(v){
  if(v==null||v==="") return null;
  if(v instanceof Date)
    return pad2(v.getUTCHours())+":"+pad2(v.getUTCMinutes())+":"+pad2(v.getUTCSeconds());
  if(typeof v==="number"){
    let s=Math.round((v%1)*86400);
    const h=Math.floor(s/3600);s-=h*3600;
    const m=Math.floor(s/60);s-=m*60;
    return pad2(h%24)+":"+pad2(m)+":"+pad2(s);
  }
  return String(v);
}
function excelDate(v){
  if(v==null||v==="") return null;
  if(v instanceof Date) return v.toISOString().slice(0,10);
  if(typeof v==="number")
    return new Date(Date.UTC(1899,11,30)+v*86400000).toISOString().slice(0,10);
  return String(v).split(" ")[0];
}

/* ====== parse the Zee-TV-format workbook ======
   Detects Zee TV programme format vs brand-ads format and parses accordingly.
   Returns {rows, format}. */
function rowsFromSheet(ws){
  const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  let h=aoa.findIndex(r=>r&&r.some(c=>String(c).trim().toUpperCase()==="PROGNAME"));
  if(h<0) throw new Error("Could not find a PROGNAME header row in this sheet.");
  const hd=aoa[h].map(c=>String(c==null?"":c).trim());
  const norm=s=>s.replace(/\s+/g," ").trim().toUpperCase();
  const idx=name=>hd.findIndex(x=>norm(x)===norm(name));

  /* ---- decide which format this is ---- */
  const hasZee = idx("No.Of Breaks")>=0 && idx("WK CODE")>=0;
  const hasAds = idx("CHNLNAME")>=0 && idx("BRAND NAME")>=0;

  if(hasAds && !hasZee) return parseAdsSheet(aoa,h,hd,norm,idx);
  if(hasZee)            return parseZeeSheet(aoa,h,hd,norm,idx);

  /* neither — explain clearly */
  const found=hd.filter(Boolean).slice(0,12).join(", ");
  throw new Error(
    "This file's columns don't match either supported format.\n\n"+
    "Zee TV programme format expects: WK CODE, No.Of Breaks, Ad ST / Ad ET, Seg 1\u201318.\n"+
    "Brand-ads format expects: CHNLNAME, BRAND NAME, COMPANY, ADST / ADET.\n\n"+
    "Header columns found instead: "+found+"\u2026"
  );
}

/* ---- brand-ads format: one row per ad spot ---- */
/* ---- brand-ads INPUT -> transformed into Zee-format show OUTPUT ----
   input has one row per ad spot; we group spots into shows and derive
   the break structure (count, and each break's start/end time). */
function timeToSecs(t){
  if(t==null||t==="") return null;
  const p=String(t).split(":").map(Number);
  if(p.length<2||p.some(isNaN)) return null;
  return p[0]*3600+p[1]*60+(p[2]||0);
}
function secsToTime(x){
  if(x==null) return null;
  x=Math.round(x);
  const p=n=>String(n).padStart(2,"0");
  return p(Math.floor(x/3600)%24)+":"+p(Math.floor(x/60)%60)+":"+p(x%60);
}

function parseAdsSheet(aoa,h,hd,norm,idx){
  const map={
    chnlname:"CHNLNAME",progdate:"PROG DATE",progst:"PROG ST",proget:"PROG ET",
    progname:"PROGNAME",proggenre:"PROG GENRE",progdur:"PROG DUR",addate:"ADDATE",
    adsrno:"AD SR NO",totalads:"TOTAL ADS",brkno:"BRK NO",brandname:"BRAND NAME",
    brandcatg:"BRAND CATG",company:"COMPANY",adcaption:"AD CAPTION",adst:"ADST",
    adet:"ADET",duration:"DURATION",adlang:"AD LANG"
  };
  const colOf={};
  for(const k in map){const i=idx(map[k]);if(i>=0)colOf[k]=i;}
  const cName=idx("PROGNAME");

  /* read every ad spot into a flat list */
  const spots=[];
  for(let i=h+1;i<aoa.length;i++){
    const r=aoa[i];
    if(!r) continue;
    const prog=r[cName];
    if(prog==null||String(prog).trim()==="") continue;
    const get=k=>{const c=colOf[k];return c==null?null:r[c];};
    spots.push({
      chnl:String(get("chnlname")||"").trim(),
      progdate:excelDate(get("progdate")),
      progst:excelTime(get("progst")),
      proget:excelTime(get("proget")),
      progname:String(prog).trim(),
      genre:get("proggenre")==null?null:String(get("proggenre")).trim(),
      progdur:fixnum(get("progdur")),
      brkno:parseInt(get("brkno"))||0,
      adst:excelTime(get("adst")),
      adet:excelTime(get("adet")),
      duration:fixnum(get("duration"))
    });
  }

  /* group spots into shows: channel + date + programme + prog start */
  const groups=new Map();
  spots.forEach(s=>{
    const key=[s.chnl,s.progdate,s.progname,s.progst].join("||");
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(s);
  });

  /* build one Zee-format row per show */
  const out=[];
  groups.forEach(list=>{
    const f=list[0];
    /* organise by break number */
    const breaks=new Map();
    list.forEach(s=>{
      const bn=s.brkno||1;
      if(!breaks.has(bn)) breaks.set(bn,[]);
      breaks.get(bn).push(s);
    });
    const breakNos=[...breaks.keys()].sort((a,b)=>a-b);

    const o={}; COLS_ZEE.forEach(([k])=>o[k]=null);
    o.chnlname=f.chnl||null;            // keep channel for per-button filtering
    o.progname=f.progname;
    o.date=f.progdate;
    o.starttime=f.progst;
    o.progst=f.progst;
    o.proget=f.proget;
    o.progdur=f.progdur;
    o.day=dayFromDate(f.progdate);
    o.nbreaks=breakNos.length;
    /* WK CODE = "Week " & (WEEKNUM(date,16) - 1) ; Week = same value */
    o.wkcode=weekCode(f.progdate);
    o.week=o.wkcode;

    /* per-break start = earliest ad ST, end = latest ad ET */
    let adSecs=0;
    breakNos.forEach((bn,i)=>{
      if(i>17) return;                 // 18-break ceiling
      const bs=breaks.get(bn);
      const sts=bs.map(x=>timeToSecs(x.adst)).filter(v=>v!=null);
      const ets=bs.map(x=>timeToSecs(x.adet)).filter(v=>v!=null);
      if(sts.length) o["b"+(i+1)+"st"]=secsToTime(Math.min(...sts));
      if(ets.length) o["b"+(i+1)+"et"]=secsToTime(Math.max(...ets));
      bs.forEach(x=>{ adSecs += (parseFloat(x.duration)||0); });
    });
    o.addur=fixnum(adSecs/60);                       // ad duration in minutes
    if(o.progdur!=null) o.contentdur=fixnum(o.progdur-adSecs/60);

    /* seg durations = content gaps: prog start->B1, B1->B2, … last break->prog end */
    const pst=timeToSecs(f.progst), pet=adjustEnd(timeToSecs(f.progst),timeToSecs(f.proget));
    let cursor=pst;
    breakNos.forEach((bn,i)=>{
      if(i>17) return;
      const bSt=timeToSecs(o["b"+(i+1)+"st"]);
      const bEt=timeToSecs(o["b"+(i+1)+"et"]);
      if(cursor!=null&&bSt!=null){
        let gap=bSt-cursor; if(gap<0) gap+=86400;
        o["seg"+(i+1)]=fixnum(gap/60);
      }
      cursor=bEt;
    });
    if(cursor!=null&&pet!=null){
      let last=pet-cursor; if(last<0) last+=86400;
      o.lastseg=fixnum(last/60);
    }
    out.push(o);
  });

  /* Mins Missing = this show's start time - previous show's end time,
     computed per channel in chronological order. */
  computeMinsMissing(out);
  return {rows:out,format:"zee"};
}

/* WK CODE: "Week " & (WEEKNUM(date,16) - 1).
   WEEKNUM mode 16 = weeks start on Saturday. */
function weekNum16(y,m,d){
  /* week containing Jan 1; weeks start Saturday (mode 16). */
  const jan1=new Date(Date.UTC(y,0,1));
  const target=new Date(Date.UTC(y,m-1,d));
  /* day-of-week with Saturday=0 */
  const satDow=dt=>(dt.getUTCDay()+1)%7;
  /* start of the week that contains Jan 1 */
  const jan1WeekStart=new Date(jan1); jan1WeekStart.setUTCDate(1-satDow(jan1));
  const diffDays=Math.floor((target-jan1WeekStart)/86400000);
  return Math.floor(diffDays/7)+1;
}
function weekCode(dateStr){
  if(!dateStr) return null;
  let y,m,d;
  if(/^\d{4}-\d{2}-\d{2}/.test(dateStr)){
    [y,m,d]=dateStr.split("-").map(Number);
  }else if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(dateStr)){
    const p=dateStr.split("/").map(Number); d=p[0];m=p[1];y=p[2];
  }else return null;
  return "Week "+(weekNum16(y,m,d)-1);
}

/* fill Mins Missing for a list of show rows */
function computeMinsMissing(rows){
  /* group by channel, order chronologically by date + prog start */
  const byChan={};
  rows.forEach(r=>{
    const c=r.chnlname||"";
    (byChan[c]=byChan[c]||[]).push(r);
  });
  for(const c in byChan){
    const list=byChan[c];
    list.sort((a,b)=>sortKeyOf(a)-sortKeyOf(b));
    for(let i=0;i<list.length;i++){
      if(i===0){ list[i].minsmissing=null; continue; }
      const prevEnd=timeToSecs(list[i-1].proget);
      const prevStart=timeToSecs(list[i-1].progst);
      let curStart=timeToSecs(list[i].progst);
      let pe=prevEnd;
      if(prevStart!=null&&prevEnd!=null&&prevEnd<prevStart) pe=prevEnd+86400; // prev rolled past midnight
      if(pe==null||curStart==null){ list[i].minsmissing=null; continue; }
      let gap=curStart-(pe%86400);
      if(gap<0) gap+=86400;
      list[i].minsmissing=fixnum(gap/60);
    }
  }
}
/* chronological sort key: epoch-ish seconds from date + prog start */
function sortKeyOf(r){
  let y=0,m=0,d=0;
  const ds=r.date||"";
  if(/^\d{4}-\d{2}-\d{2}/.test(ds)){[y,m,d]=ds.split("-").map(Number);}
  else if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(ds)){const p=ds.split("/").map(Number);d=p[0];m=p[1];y=p[2];}
  const days=Date.UTC(y,(m||1)-1,d||1)/86400000;
  return days*86400+(timeToSecs(r.progst)||0);
}

/* prog end may roll past midnight — keep it after start */
function adjustEnd(st,et){
  if(st==null||et==null) return et;
  return (et<st) ? et+86400 : et;
}
/* weekday name from a YYYY-MM-DD or DD/MM/YYYY string */
function dayFromDate(d){
  if(!d) return null;
  let dt;
  if(/^\d{4}-\d{2}-\d{2}/.test(d)) dt=new Date(d+"T00:00:00Z");
  else if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(d)){
    const p=d.split("/"); dt=new Date(Date.UTC(+p[2],+p[1]-1,+p[0]));
  }else return null;
  if(isNaN(dt)) return null;
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][dt.getUTCDay()];
}

/* ---- Zee TV programme format: one row per show ---- */
function parseZeeSheet(aoa,h,hd,norm,idx){
  const single={
    wkcode:["WK CODE","Week"],minsmissing:["Mins Missing"],week:["Week"],
    day:["Day"],date:["Date"],starttime:["Start Time"],progst:["PROG ST"],
    proget:["PROG ET"],contentdur:["Content Dur"],progdur:["Prog Dur"],
    addur:["Ad Dur"],nbreaks:["No.Of Breaks"]
  };
  const colOf={};
  for(const k in single){
    for(const name of single[k]){const i=idx(name);if(i>=0){colOf[k]=i;break;}}
  }
  const adSt=[],adEt=[];
  hd.forEach((v,i)=>{const n=norm(v);if(n==="AD ST")adSt.push(i);else if(n==="AD ET")adEt.push(i);});
  const segCols=[];
  hd.forEach((v,i)=>{if(/^SEG\s*\d+$/.test(norm(v)))segCols.push([norm(v),i]);});
  segCols.sort((a,b)=>parseInt(a[0].replace(/\D/g,""))-parseInt(b[0].replace(/\D/g,"")));
  const lastSegIdx=idx("Last Seg");
  const cP=idx("PROGNAME");

  const timeKeys=new Set(["starttime","progst","proget"]);
  const numKeys=new Set(["minsmissing","contentdur","progdur","addur","nbreaks"]);

  const out=[];
  for(let i=h+1;i<aoa.length;i++){
    const r=aoa[i];
    if(!r) continue;
    const prog=r[cP];
    if(prog==null||String(prog).trim()==="") continue;
    const o={}; COLS_ZEE.forEach(([k])=>o[k]=null);
    o.progname=String(prog).trim();
    for(const k in colOf){
      let val=r[colOf[k]];
      if(k==="date") val=excelDate(val);
      else if(timeKeys.has(k)) val=excelTime(val);
      else if(numKeys.has(k)) val=fixnum(val);
      else val=(val==null||val==="")?null:String(val).trim();
      o[k]=val;
    }
    for(let b=0;b<18;b++){
      const stI=adSt[b],etI=adEt[b];
      o["b"+(b+1)+"st"]= (stI!=null) ? excelTime(r[stI]) : null;
      o["b"+(b+1)+"et"]= (etI!=null) ? excelTime(r[etI]) : null;
    }
    for(let s=0;s<18;s++){
      const c=segCols[s];
      o["seg"+(s+1)] = c ? fixnum(r[c[1]]) : null;
    }
    o.lastseg = lastSegIdx>=0 ? fixnum(r[lastSegIdx]) : null;
    out.push(o);
  }
  return {rows:out,format:"zee"};
}

function loadFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary",cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const parsed=rowsFromSheet(ws);
      if(!parsed.rows.length){
        showLoadError("No data rows found",
          "The sheet has a header row but no data rows filled in below it.");
        return;
      }
      /* all transformed shows go into one shared pool */
      allShows=parsed.rows;
      lastFilename=file.name;
      chnlMap={};                 // fresh mapping for the new file
      syncChannelMap();
      /* land on the active channel if it has shows, else the first that does */
      let land=activeChannel;
      if(!showsForChannel(land).length){
        land=CHANNELS.find(c=>showsForChannel(c).length)||activeChannel;
      }
      applyChannel(land);
    }catch(err){
      showLoadError("Couldn't read "+file.name, err.message);
    }
  };
  reader.readAsBinaryString(file);
}

function showLoadError(title,detail){
  document.getElementById("sourceTag").textContent="Load failed";
  const safe=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  document.getElementById("tableArea").innerHTML=
    '<div class="loaderr">'+
      '<div class="loaderr-title">⚠ '+safe(title)+'</div>'+
      '<div class="loaderr-detail">'+safe(detail).replace(/\n/g,"<br>")+'</div>'+
    '</div>';
  document.getElementById("pager").innerHTML="";
  document.getElementById("tableNote").textContent="";
  document.getElementById("colCount").textContent="";
}

/* ====== filter / sort ====== */
/* per-format filter config: two dropdown columns + search target */
const FILTER_CFG={
  zee:{f1:{key:"week",label:"Week"}, f2:{key:"day",label:"Day"},
       search:["progname"], searchLabel:"Search programme"},
  ads:{f1:{key:"proggenre",label:"Genre"}, f2:{key:"adlang",label:"Language"},
       search:["progname","brandname","company"], searchLabel:"Search show / brand / company"}
};

function filtered(){
  const q=filterState.q.toLowerCase();
  const cfg=FILTER_CFG[FORMAT];
  return RAW.filter(r=>{
    if(filterState.f1 && String(r[cfg.f1.key])!==filterState.f1) return false;
    if(filterState.f2 && String(r[cfg.f2.key])!==filterState.f2) return false;
    if(q && !cfg.search.some(k=>String(r[k]||"").toLowerCase().includes(q))) return false;
    return true;
  });
}
function sortedRows(rows){
  if(!sortKey) return rows;
  const r=[...rows];
  r.sort((a,b)=>{
    let x=a[sortKey],y=b[sortKey];
    const nx=parseFloat(x),ny=parseFloat(y);
    if(!isNaN(nx)&&!isNaN(ny)){x=nx;y=ny;}
    else{x=String(x==null?"":x);y=String(y==null?"":y);}
    return x<y?-sortDir:x>y?sortDir:0;
  });
  return r;
}
/* which columns to actually render (optionally drop all-empty break/seg cols) */
function visibleCols(rows){
  if(!hideEmptyBreaks||FORMAT!=="zee") return COLS;
  return COLS.filter(([k,l,t,g])=>{
    if(g==="show") return true;
    return rows.some(r=>r[k]!=null&&r[k]!=="");
  });
}

/* ====== renderers ====== */
function renderStats(rows){
  let cells;
  if(FORMAT==="ads"){
    const totDur=rows.reduce((s,r)=>s+(parseFloat(r.duration)||0),0);
    const brands=new Set(rows.map(r=>r.brandname).filter(Boolean)).size;
    const shows=new Set(rows.map(r=>r.progname).filter(Boolean)).size;
    const langs=new Set(rows.map(r=>r.adlang).filter(Boolean)).size;
    cells=[
      ["Total Ad Spots",rows.length.toLocaleString(),""],
      ["Total Ad Time",(totDur/60).toFixed(1),"<small> min</small>"],
      ["Unique Brands",brands.toLocaleString(),""],
      ["Programmes",shows.toLocaleString(),""],
      ["Languages",langs.toLocaleString(),""]
    ];
  }else{
    const totBreaks=rows.reduce((s,r)=>s+(parseInt(r.nbreaks)||0),0);
    const totAd=rows.reduce((s,r)=>s+(parseFloat(r.addur)||0),0);
    const totProg=rows.reduce((s,r)=>s+(parseFloat(r.progdur)||0),0);
    const weeks=new Set(rows.map(r=>r.week).filter(Boolean)).size;
    cells=[
      ["Total Shows",rows.length.toLocaleString(),""],
      ["Total Ad Breaks",totBreaks.toLocaleString(),""],
      ["Total Ad Time",totAd.toFixed(1),"<small> min</small>"],
      ["Total Prog Time",(totProg/60).toFixed(1),"<small> hr</small>"],
      ["Weeks Covered",weeks.toLocaleString(),""]
    ];
  }
  document.getElementById("stats").innerHTML=cells.map(([k,v,s])=>
    `<div class="stat"><div class="k">${k}</div><div class="v">${v}${s}</div></div>`).join("");
}

function renderFilters(){
  const cfg=FILTER_CFG[FORMAT];
  const uniq=k=>[...new Set(RAW.map(r=>r[k]).filter(v=>v!=null&&v!==""))].map(String).sort();
  const sel=(slot,col)=>{
    const opts=['<option value="">All</option>']
      .concat(uniq(col.key).map(v=>`<option ${filterState[slot]===v?'selected':''}>${esc(v)}</option>`));
    return `<label>${col.label}<select data-slot="${slot}">${opts.join("")}</select></label>`;
  };
  const hideToggle=(FORMAT==="zee")
    ? `<label class="chk"><input type="checkbox" id="hideEmpty" ${hideEmptyBreaks?'checked':''}>
         Hide empty break / seg columns</label>`
    : "";
  document.getElementById("filters").innerHTML=
    sel("f1",cfg.f1)+sel("f2",cfg.f2)+
    `<label>${cfg.searchLabel}
       <input type="text" id="searchBox" placeholder="type to filter…" value="${esc(filterState.q)}"></label>`+
    hideToggle+
    `<button class="clearf" id="clearBtn">Clear all</button>`;
  document.querySelectorAll("#filters select").forEach(s=>{
    s.onchange=()=>{filterState[s.dataset.slot]=s.value;page=1;render();};
  });
  const sb=document.getElementById("searchBox");
  let t;
  sb.oninput=()=>{clearTimeout(t);t=setTimeout(()=>{filterState.q=sb.value;page=1;render();},180);};
  const he=document.getElementById("hideEmpty");
  if(he) he.onchange=e=>{hideEmptyBreaks=e.target.checked;render();};
  document.getElementById("clearBtn").onclick=()=>{reset();renderFilters();render();};
}

function cellHTML(row,key,type){
  const v=row[key];
  if(v==null||v===""){
    return '<span class="blank">·</span>';
  }
  if(type==="pill") return `<span class="pill">${esc(v)}</span>`;
  return esc(v);
}
function cellClass(type){
  if(type==="num") return "num";
  if(type==="time") return "time";
  if(type==="bold") return "bold";
  return "";
}

function renderTable(rows){
  const area=document.getElementById("tableArea");
  const pager=document.getElementById("pager");
  const note=document.getElementById("tableNote");
  if(!rows.length){
    area.innerHTML='<div class="empty">No shows match the current filters.</div>';
    pager.innerHTML="";note.textContent="";
    document.getElementById("colCount").textContent="";
    return;
  }
  const cols=visibleCols(rows);
  document.getElementById("colCount").textContent="· "+cols.length+" columns";

  const sorted=sortedRows(rows);
  const totalPages=Math.max(1,Math.ceil(sorted.length/pageSize));
  if(page>totalPages) page=totalPages;
  const start=(page-1)*pageSize;
  const slice=sorted.slice(start,start+pageSize);

  /* group-band header */
  const groups=[];
  cols.forEach(([k,l,t,g])=>{
    const last=groups[groups.length-1];
    if(last&&last.g===g) last.n++;
    else groups.push({g,n:1});
  });
  const bandLabel={
    show:(FORMAT==="ads")?"Programme":"Show Info",
    break:"Ad Breaks (18)",
    seg:"Segment Durations",
    ad:"Ad Spot Details"
  };
  const bands=groups.map(gr=>
    `<th class="bands band-${gr.g}" colspan="${gr.n}">${bandLabel[gr.g]}</th>`).join("");

  /* column header */
  let firstOfGroup={};
  groups.forEach(()=>{});
  let prevG=null;
  const ths=cols.map(([k,l,t,g])=>{
    const gs=(g!==prevG)?" gs":""; prevG=g;
    const fz=(t==="progfreeze")?" freeze":"";
    const arr=sortKey===k?` <span class="arr">${sortDir>0?'▲':'▼'}</span>`:'';
    return `<th class="cols${gs}${fz}" data-k="${k}">${esc(l)}${arr}</th>`;
  }).join("");

  /* body */
  prevG=null;
  const body=slice.map(row=>{
    let pg=null;
    return "<tr>"+cols.map(([k,l,t,g])=>{
      const gs=(g!==pg)?" gs":""; pg=g;
      const fz=(t==="progfreeze")?" freeze":"";
      const cc=cellClass(t);
      const cls=[cc,gs.trim(),fz.trim()].filter(Boolean).join(" ");
      return `<td${cls?` class="${cls}"`:''}>${cellHTML(row,k,t)}</td>`;
    }).join("")+"</tr>";
  }).join("");

  area.innerHTML=
    `<table>
      <thead>
        <tr class="bands"><th class="bands band-show freeze" style="display:none"></th>${bands}</tr>
        <tr class="cols">${ths}</tr>
      </thead>
      <tbody>${body}</tbody>
    </table>`;
  /* note: the band row's first cell is handled by colspan; freeze applies to the cols/td */

  area.querySelectorAll("tr.cols th").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(sortKey===k) sortDir*=-1; else{sortKey=k;sortDir=1;}
    renderTable(filtered());
  });

  const mk=(label,p,dis)=>`<button data-p="${p}" ${dis?'disabled':''}>${label}</button>`;
  pager.innerHTML=
    mk("« First",1,page===1)+mk("‹ Prev",page-1,page===1)+
    `<span class="info">Page ${page} / ${totalPages}</span>`+
    mk("Next ›",page+1,page===totalPages)+mk("Last »",totalPages,page===totalPages);
  pager.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    page=parseInt(b.dataset.p);renderTable(filtered());
    document.querySelector(".tablecard").scrollTop=0;
    document.querySelector(".tablecard").scrollLeft=0;
  });
  const unit=(FORMAT==="ads")?"ad spots":"shows";
  note.textContent="Showing "+unit+" "+(start+1)+"–"+(start+slice.length)+" of "+
    sorted.length.toLocaleString()+" filtered · "+RAW.length.toLocaleString()+" total · "+
    "scroll sideways for all "+COLS.length+" columns";
}

function render(){
  const rows=filtered();
  renderStats(rows);
  renderTable(rows);
}
function reset(){
  filterState.f1=filterState.f2=filterState.q="";
  sortKey=null;sortDir=1;page=1;
}

/* ====== CSV export — every column, matching the sheet ====== */
function exportCSV(){
  const rows=sortedRows(filtered());
  if(!rows.length){alert("Nothing to export.");return;}
  const cell=v=>{v=(v==null||v==="")?"":String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const head=COLS.map(c=>c[1]);
  const lines=[head.join(",")];
  rows.forEach(r=>lines.push(COLS.map(([k])=>cell(r[k])).join(",")));

}

/* ====== channel selector ======
   ALL loaded shows live in one pool; each channel button shows only the
   shows whose CHNLNAME maps to that button. */
const CHANNELS=["Zee","Star Plus","Colors","Set","Sab","Star Bharat","&TV"];
let allShows=[];                 // every transformed show row, all channels
let lastFilename="";
let activeChannel=CHANNELS[0];

/* user-controlled mapping: raw CHNLNAME value -> button name (or "" = unassigned).
   seeded with a best-guess, fully overridable in the Map Channels panel. */
let chnlMap={};

/* initial best guess for a raw CHNLNAME — used only to pre-fill the mapping UI */
function guessChannel(raw){
  const n=String(raw||"").replace(/\s+/g," ").trim().toUpperCase();
  const guesses={
    "Zee":["ZEE","ZEE TV","ZEETV"],
    "Star Plus":["STAR PLUS","STARPLUS"],
    "Colors":["COLORS","COLORS TV","COLOURS"],
    "Set":["SET","SONY","SONY SET","SONY ENTERTAINMENT TELEVISION","SET INDIA"],
    "Sab":["SAB","SONY SAB","SAB TV"],
    "Star Bharat":["STAR BHARAT","STARBHARAT"],
    "&TV":["&TV","AND TV","ANDTV","& TV"]
  };
  for(const btn of CHANNELS){
    if(guesses[btn].some(a=>a===n)) return btn;
  }
  return "";                     // no guess — user assigns it
}
/* distinct CHNLNAME values present in the loaded pool */
function distinctChannels(){
  return [...new Set(allShows.map(r=>String(r.chnlname||"").trim()).filter(Boolean))].sort();
}
/* (re)build chnlMap for the current pool, keeping any choices already made */
function syncChannelMap(){
  distinctChannels().forEach(raw=>{
    if(!(raw in chnlMap)) chnlMap[raw]=guessChannel(raw);
  });
}
/* which button a row belongs to, per the user mapping */
function channelOf(chnlname){
  const raw=String(chnlname||"").trim();
  return chnlMap[raw]||null;
}
/* shows belonging to a given button */
function showsForChannel(ch){
  return allShows.filter(r=>channelOf(r.chnlname)===ch);
}
/* CHNLNAME values not yet assigned to any button */
function unmappedChannels(){
  return distinctChannels().filter(raw=>!chnlMap[raw]);
}

/* ---- Map Channels panel ---- */
function renderChannelMap(){
  const box=document.getElementById("chanMap");
  const vals=distinctChannels();
  if(!vals.length){box.innerHTML="";box.style.display="none";return;}
  box.style.display="block";
  const opts=btn=>['<option value="">— unassigned —</option>']
    .concat(CHANNELS.map(c=>`<option value="${esc(c)}"${btn===c?' selected':''}>${esc(c)}</option>`))
    .join("");
  const rows=vals.map(raw=>{
    const n=allShows.filter(r=>String(r.chnlname||"").trim()===raw).length;
    return `<div class="cmrow">
      <span class="cmraw">${esc(raw)} <em>(${n})</em></span>
      <span class="cmarrow">→</span>
      <select class="cmsel" data-raw="${esc(raw)}">${opts(chnlMap[raw]||"")}</select>
    </div>`;
  }).join("");
  const nUn=unmappedChannels().length;
  box.innerHTML=
    `<div class="cmhead">Map Channels`+
      (nUn?` <span class="cmwarn">${nUn} unassigned</span>`:` <span class="cmok">all assigned</span>`)+
    `</div>`+
    `<div class="cmgrid">${rows}</div>`+
    `<div class="cmnote">Each CHNLNAME value from your file \u2014 assign it to a channel button. `+
     `Count in brackets = shows with that value.</div>`;
  box.querySelectorAll(".cmsel").forEach(s=>{
    s.onchange=()=>{
      chnlMap[s.dataset.raw]=s.value;
      renderChannels();              // rebuilds badges + this panel
      applyChannel(activeChannel);   // re-filter the table
    };
  });
}

function renderChannels(){
  document.getElementById("channels").innerHTML=CHANNELS.map(c=>{
    const n=showsForChannel(c).length;
    const badge=n?` <span class="chdot">${n}</span>`:'';
    return `<button class="chbtn${c===activeChannel?' active':''}" data-ch="${esc(c)}">${esc(c)}${badge}</button>`;
  }).join("");
  document.querySelectorAll("#channels .chbtn").forEach(b=>{
    b.onclick=()=>switchChannel(b.dataset.ch);

/* show the active channel's slice of the pool */
function applyChannel(ch){
  activeChannel=ch;
  FORMAT="zee"; COLS=COLS_ZEE;
  RAW=showsForChannel(ch);
  document.getElementById("tableHeading").textContent=ch+" — Shows";
  if(RAW.length){
    document.getElementById("sourceTag").textContent=
      ch+" · "+RAW.length.toLocaleString()+" shows"+(lastFilename?" · "+lastFilename:"");
    reset();renderChannels();renderFilters();render();
  }else{
    /* nothing for this channel yet */
    document.getElementById("sourceTag").textContent=ch+" · no shows";
    reset();renderChannels();
    document.getElementById("filters").innerHTML="";
    document.getElementById("stats").innerHTML="";
    document.getElementById("pager").innerHTML="";
    document.getElementById("tableNote").textContent="";
    document.getElementById("colCount").textContent="";
    const anyData=allShows.length>0;
    document.getElementById("tableArea").innerHTML=
      '<div class="loaderr">'+
        '<div class="loaderr-title">No '+esc(ch)+' shows</div>'+
        '<div class="loaderr-detail">'+(anyData
          ? 'The loaded file has no rows whose CHNLNAME maps to <b>'+esc(ch)+'</b>. '+
            'Switch to a channel that has a count, or upload a file containing '+esc(ch)+' data.'
          : 'Click <b>Upload Excel</b> above to load an ad-monitoring sheet '+
            '(CHNLNAME / BRAND NAME format). Shows are sorted into channel buttons automatically.')+
        '</div>'+
      '</div>';
  }
}
function switchChannel(ch){ applyChannel(ch); }

/* ====== wire up ====== */
document.getElementById("uploadBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{
  if(e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value="";          // allow re-uploading the same filename
};
document.getElementById("sampleBtn").onclick=()=>{
  allShows=JSON.parse(JSON.stringify(SAMPLE.rows));
  lastFilename="sample data";
  chnlMap={}; syncChannelMap();
  applyChannel("&TV");        // sample is &TV data
};
document.getElementById("pageSize").onchange=e=>{pageSize=parseInt(e.target.value);page=1;renderTable(filtered());};
document.getElementById("exportBtn").onclick=exportCSV;

/* boot — load the sample pool, land on its channel */
allShows=JSON.parse(JSON.stringify(SAMPLE.rows));
lastFilename="sample data";
chnlMap={}; syncChannelMap();
applyChannel("&TV");
</script>
</body>
